<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic-Tac-Toe</title>
    <link rel="stylesheet" href="./css/style.css">
    <script src="script.js" defer></script>
</head>
<body>
    <div class="viewport">
        <div>
            <header class="header">
                <span class="header__text">Tic Tac</span>
                <span class="header__text header__text--italic">Pro</span>
            </header>
        </div>
        <div class="main">
            <div class="scoreboard" data-player-number="1">
                <div class="scoreboard__score" data-player-number="1">0</div>
                <div class="scoreboard__nameplate">Player1</div>
                <input class="scoreboard__input" type="text" minlength="3">
                <img class="scoreboard__icon" src="./img/edit.svg" alt="Edit Player 1's name" height="24" width="24">
            </div>
            <div class="gameboard">
                <div class="gameboard__tile" id="0"></div>
                <div class="gameboard__tile gameboard__tile--border-lr" id="1"></div>
                <div class="gameboard__tile" id="2"></div>
                <div class="gameboard__tile gameboard__tile--border-tb" id="3"></div>
                <div class="gameboard__tile gameboard__tile--border-tb gameboard__tile--border-lr" id="4"></div>
                <div class="gameboard__tile gameboard__tile--border-tb" id="5"></div>
                <div class="gameboard__tile" id="6"></div>
                <div class="gameboard__tile gameboard__tile--border-lr" id="7"></div>
                <div class="gameboard__tile" id="8"></div>
            </div>
            <div class="scoreboard" data-player-number="2">
                <div class="scoreboard__score" data-player-number="2">0</div>
                <div class="scoreboard__nameplate">Player2</div>
                <input class="scoreboard__input" type="text" minlength="3">
                <img class="scoreboard__icon" src="./img/edit.svg" alt="Edit Player 2's name" height="24" width="24">
            </div>
        </div>
        <div class="postgame-summary">
            <div class="postgame-summary__winner">__ Wins!</div>
            <div class="postgame-summary__prompt">Click to play again.</div>
        </div>
        <div>
            <footer class="footer">
                <span class="footer-text">Background courtesy of ___ on _____</span>
            </footer>
        </div>
    </div>
</body>
</html>
