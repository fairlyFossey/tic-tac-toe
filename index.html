<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic-Tac-Toe</title>
    <link rel="stylesheet" href="./css/style.css">
    <script src="script.js" defer></script>
</head>
<body>
    <div class="gameboard-row">
        <div class="gameboard-tile" id="0">0</div>
        <div class="gameboard-tile" id="1">1</div>
        <div class="gameboard-tile" id="2">2</div>
    </div>
    <div class="gameboard-row">
        <div class="gameboard-tile" id="3">3</div>
        <div class="gameboard-tile" id="4">4</div>
        <div class="gameboard-tile" id="5">5</div>
    </div>
    <div class="gameboard-row">
        <div class="gameboard-tile" id="6">6</div>
        <div class="gameboard-tile" id="7">7</div>
        <div class="gameboard-tile" id="8">8</div>
    </div>
</body>
</html>
